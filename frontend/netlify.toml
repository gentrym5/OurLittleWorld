[build]
  # Directory containing the frontend source (relative to repo root)
  base = "frontend"

  # Next.js build command
  command = "npm run build"

  # Next.js output directory
  publish = ".next"

[[plugins]]
  # Official Netlify plugin for Next.js App Router support
  package = "@netlify/plugin-nextjs"

[build.environment]
  # Node.js version to use for the build
  NODE_VERSION = "20"

# Redirect all unmatched routes to the Next.js handler
# (The @netlify/plugin-nextjs plugin handles this automatically,
#  but this explicit rule ensures correct behaviour for older plugin versions)
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/___netlify-handler"
  status = 200
  force = false

# Cache static assets aggressively
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
